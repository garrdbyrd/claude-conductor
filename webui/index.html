<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Kanban</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --todo: #8b949e;
    --inprogress: #388bfd;
    --done: #3fb950;
    --blocked: #da3633;
    --needsinput: #f59e0b;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .refresh-indicator { font-size: 12px; color: var(--text-muted); }
  .refresh-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--done);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── Needs-input alert banner ── */
  .alert-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    background: #2d1f00;
    border-bottom: 1px solid var(--needsinput);
    color: var(--needsinput);
    font-size: 13px;
    font-weight: 500;
  }
  .alert-banner.visible { display: flex; }
  .alert-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--needsinput);
    animation: pulse 1s infinite;
    flex-shrink: 0;
  }

  /* ── Project legend / filter ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 20px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    align-items: center;
  }
  .legend-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    padding: 3px 6px;
    border-radius: var(--radius);
    transition: background 0.1s;
  }
  .legend-item:hover { background: var(--surface2); }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-check {
    width: 14px; height: 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--done);
    flex-shrink: 0;
  }
  .legend-item.active .legend-check { background: #0d2818; border-color: var(--done); }

  /* ── Board ── */
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    padding: 20px 24px;
    min-height: calc(100vh - 140px);
    align-items: start;
  }

  /* ── Column ── */
  .column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .column-header {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .column-header .count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-left: auto;
  }
  .col-todo        .column-header { color: var(--todo);       border-top: 2px solid var(--todo); }
  .col-inprogress  .column-header { color: var(--inprogress); border-top: 2px solid var(--inprogress); }
  .col-done        .column-header { color: var(--done);       border-top: 2px solid var(--done); }
  .col-blocked     .column-header { color: var(--blocked);    border-top: 2px solid var(--blocked); }
  .col-needsinput  .column-header { color: var(--needsinput); border-top: 2px solid var(--needsinput); }

  .column-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

  /* ── Card ── */
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #484f58; }
  .card.needs-input-card {
    border-color: #7a4f00;
    background: #1a1400;
  }
  .card.needs-input-card:hover { border-color: var(--needsinput); }
  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }
  .project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .project-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .card-time { margin-left: auto; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .card-title { font-size: 13px; font-weight: 500; line-height: 1.45; margin-bottom: 8px; }
  .card-id { font-size: 11px; color: var(--text-dim); font-family: ui-monospace, monospace; margin-bottom: 6px; }
  .card-log {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.4;
    border-top: 1px solid var(--border);
    padding-top: 7px;
    margin-top: 4px;
  }
  .card-log.urgent { color: var(--needsinput); font-style: normal; font-weight: 500; }

  /* ── Resolve button ── */
  .resolve-btn {
    margin-top: 10px;
    width: 100%;
    padding: 6px 10px;
    background: #2d1f00;
    border: 1px solid var(--needsinput);
    border-radius: var(--radius);
    color: var(--needsinput);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, color 0.15s;
  }
  .resolve-btn:hover { background: var(--needsinput); color: #000; }
  .resolve-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Empty state ── */
  .empty { padding: 20px 14px; text-align: center; color: var(--text-dim); font-size: 12px; }

  /* ── Error state ── */
  .error-banner {
    background: #2d1b1b;
    border: 1px solid var(--blocked);
    color: #ff9492;
    padding: 10px 24px;
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Agent Kanban</h1>
  <div class="header-right">
    <span class="refresh-indicator">
      <span class="refresh-dot"></span>
      <span id="refresh-status">loading…</span>
    </span>
  </div>
</header>

<div class="alert-banner" id="alert-banner">
  <div class="alert-dot"></div>
  <span id="alert-text"></span>
</div>
<div class="error-banner" id="error-banner"></div>
<div class="legend" id="legend"><span class="legend-label">Projects</span></div>

<div class="board">
  <div class="column col-needsinput">
    <div class="column-header">Needs Input <span class="count" id="count-needs_input">0</span></div>
    <div class="column-cards" id="col-needs_input"></div>
  </div>
  <div class="column col-todo">
    <div class="column-header">Todo <span class="count" id="count-todo">0</span></div>
    <div class="column-cards" id="col-todo"></div>
  </div>
  <div class="column col-inprogress">
    <div class="column-header">In Progress <span class="count" id="count-in_progress">0</span></div>
    <div class="column-cards" id="col-in_progress"></div>
  </div>
  <div class="column col-done">
    <div class="column-header">Done <span class="count" id="count-done">0</span></div>
    <div class="column-cards" id="col-done"></div>
  </div>
  <div class="column col-blocked">
    <div class="column-header">Blocked <span class="count" id="count-blocked">0</span></div>
    <div class="column-cards" id="col-blocked"></div>
  </div>
</div>

<script>
const REFRESH_MS = 5000;
const FILTER_KEY = 'conductor_project_filter';

let lastDb = null;

// ── Project filter (persisted in localStorage) ────────────────────────────────
function getFilter() {
  try { return JSON.parse(localStorage.getItem(FILTER_KEY) || '{}'); } catch { return {}; }
}

function setFilterProject(id, enabled) {
  const f = getFilter();
  f[id] = enabled;
  localStorage.setItem(FILTER_KEY, JSON.stringify(f));
}

// A project is visible if it has no saved entry (default on) or its entry is true
function isVisible(id) {
  const f = getFilter();
  return f[id] !== false;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderLegend(projects) {
  const el = document.getElementById('legend');
  const items = Object.entries(projects).map(([id, p]) => {
    const on = isVisible(id);
    return `
      <div class="legend-item ${on ? 'active' : 'dimmed'}" data-id="${escHtml(id)}" onclick="toggleProject('${escHtml(id)}')">
        <div class="legend-check">${on ? '✓' : ''}</div>
        <div class="legend-dot" style="background:${escHtml(p.color)}"></div>
        <span>${escHtml(p.name)}</span>
      </div>`;
  }).join('');
  el.innerHTML = `<span class="legend-label">Projects</span>${items}`;
}

function renderBoard(db) {
  const columns = { needs_input: [], todo: [], in_progress: [], done: [], blocked: [] };

  for (const [id, proj] of Object.entries(db.projects)) {
    if (!isVisible(id)) continue;
    for (const task of proj.tasks) {
      const col = columns[task.status] ?? columns.todo;
      col.push({ task, proj });
    }
  }

  // Alert banner for needs_input
  const ni = columns.needs_input;
  const banner = document.getElementById('alert-banner');
  if (ni.length > 0) {
    const projects = [...new Set(ni.map(({proj}) => proj.name))].join(', ');
    document.getElementById('alert-text').textContent =
      `${ni.length} task${ni.length > 1 ? 's' : ''} waiting for your input — ${projects}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  for (const [status, items] of Object.entries(columns)) {
    const el      = document.getElementById(`col-${status}`);
    const countEl = document.getElementById(`count-${status}`);
    countEl.textContent = items.length;

    if (items.length === 0) {
      el.innerHTML = '<div class="empty">No tasks</div>';
      continue;
    }

    el.innerHTML = items.map(({ task, proj }) => {
      const isNI      = task.status === 'needs_input';
      const latestLog = task.log.length > 0 ? task.log[task.log.length - 1] : null;

      // For needs_input, show the question prominently
      const logHtml = latestLog
        ? `<div class="card-log ${isNI ? 'urgent' : ''}">${escHtml(latestLog.message)}</div>`
        : '';

      const resolveBtn = isNI
        ? `<button class="resolve-btn" onclick="resolveTask('${escHtml(task.id)}', this)">
             ✓ Mark Resolved — Resume Work
           </button>`
        : '';

      return `
        <div class="card ${isNI ? 'needs-input-card' : ''}">
          <div class="card-top">
            <div class="project-dot" style="background:${escHtml(proj.color)}"></div>
            <span class="project-label">${escHtml(proj.name)}</span>
            <span class="card-time">${timeAgo(task.updated_at)}</span>
          </div>
          <div class="card-title">${escHtml(task.title)}</div>
          <div class="card-id">${escHtml(task.id)}</div>
          ${logHtml}
          ${resolveBtn}
        </div>`;
    }).join('');
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
function toggleProject(id) {
  setFilterProject(id, !isVisible(id));
  if (lastDb) renderLegend(lastDb.projects);
  if (lastDb) renderBoard(lastDb);
}

async function resolveTask(taskId, btn) {
  btn.disabled = true;
  btn.textContent = 'Resolving…';
  try {
    const res = await fetch('/api/task/resolve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_id: taskId }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await refresh();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '✓ Mark Resolved — Resume Work';
    console.error('resolve failed:', e);
  }
}

// ── Data fetching ─────────────────────────────────────────────────────────────
async function refresh() {
  try {
    const res = await fetch('/api/db');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const db = await res.json();
    lastDb = db;
    renderLegend(db.projects);
    renderBoard(db);
    document.getElementById('error-banner').style.display = 'none';
    document.getElementById('refresh-status').textContent =
      `Updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = `Failed to load: ${e.message}`;
    document.getElementById('refresh-status').textContent = 'Error — retrying…';
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
